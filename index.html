<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AI IMEI Scanner Final</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:20px;
}

.container{
    max-width:520px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:14px;
    box-shadow:0 6px 25px rgba(0,0,0,0.15);
}

video{
    width:100%;
    border-radius:12px;
    background:black;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#0070f3;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.btn:active{transform:scale(0.98);}

#status{
    margin-top:10px;
    font-weight:bold;
    color:#0070f3;
}

.imei{
    font-size:22px;
    font-weight:bold;
    color:#0070f3;
}

.bar{
    width:100%;
    height:10px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar-fill{
    width:0%;
    height:10px;
    background:linear-gradient(90deg,#0070f3,#00c6ff);
    transition:width .2s;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 AI IMEI Scanner Final</h2>

<video id="video" autoplay playsinline></video>

<div class="bar">
    <div class="bar-fill" id="bar"></div>
</div>

<button class="btn" onclick="startCamera()">Start Camera</button>
<button class="btn" onclick="captureAI()">AI Scan</button>

<div id="status">Ready</div>

<p>IMEI: <span class="imei" id="imei"></span></p>

</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");
const bar = document.getElementById("bar");

const reader = new ZXing.BrowserMultiFormatReader();
let stream = null;

function setBar(v){
    bar.style.width = v + "%";
}

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}

function beep(){
    const ctx = new AudioContext();
    const o = ctx.createOscillator();
    o.type = "sine";
    o.frequency.value = 800;
    o.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(),150);
}

async function startCamera(){

    stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{ exact:"environment" }
        },
        audio:false
    }).catch(async ()=>{

        return await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:"environment" },
            audio:false
        });

    });

    video.srcObject = stream;
    await video.play();

    status.innerText = "Camera ready";
}

function preprocess(canvas){

    const ctx = canvas.getContext("2d");

    // 🧠 AI-like enhancement
    ctx.filter = "contrast(2.0) brightness(1.3) grayscale(1)";
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    return canvas;
}

async function scan(canvas){

    for(let i=0;i<4;i++){

        try{
            const res = await reader.decodeFromCanvas(canvas);
            const match = res.text.match(/\d{15}/);

            if(match) return match[0];

        }catch(e){}
    }

    return null;
}

async function captureAI(){

    status.innerText = "AI scanning...";
    setBar(20);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    setBar(40);

    preprocess(canvas);

    setBar(60);

    const imei = await scan(canvas);

    setBar(90);

    if(imei){

        document.getElementById("imei").innerText = imei;
        status.innerText = "AI detected IMEI!";
        setBar(100);

        vibrate();
        beep();

    } else {

        status.innerText = "No IMEI detected - try better lighting";
    }

    setTimeout(()=>setBar(0),1000);
}
</script>

</body>
</html>
