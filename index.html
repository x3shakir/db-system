<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro IMEI Scanner</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.btn{
    width:100%;
    padding:12px;
    background:#0070f3;
    color:#fff;
    border:none;
    border-radius:8px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{background:#0051bb;}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
}

#status{
    display:none;
    margin-top:10px;
    color:#0070f3;
}

.invoice{
    display:none;
    margin-top:20px;
    border:2px dashed #0070f3;
    padding:15px;
    text-align:left;
}

.imei{color:#0070f3;font-weight:bold;}
</style>

</head>

<body>

<div class="container">

<h2>📷 Pro IMEI Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="fileInput">

<input type="text" id="imei" placeholder="IMEI">

<div id="status">Scanning...</div>

<button class="btn" onclick="generateInvoice()">Generate Invoice</button>

<div class="invoice" id="invoice">
<h3>INVOICE</h3>
<p>IMEI: <span class="imei" id="invImei"></span></p>
<p>Date: <span id="date"></span></p>
<p>Item: Smartphone</p>
<p>Price: $500</p>
<button class="btn" onclick="window.print()">Print</button>
</div>

</div>

<!-- ZXing Library -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
let detector = null;
if('BarcodeDetector' in window){
    detector = new BarcodeDetector({
        formats:[
            'code_128','code_39','ean_13','qr_code','pdf417','upc_a'
        ]
    });
}

const codeReader = new ZXing.BrowserMultiFormatReader();

document.getElementById("fileInput").addEventListener("change", async function(e){

    const file = e.target.files[0];
    if(!file) return;

    const status = document.getElementById("status");
    status.style.display = "block";
    status.innerText = "Processing image...";

    const bitmap = await createImageBitmap(file);

    // تحسين الصورة
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const scale = Math.min(1280 / bitmap.width, 1280 / bitmap.height, 1);

    canvas.width = bitmap.width * scale;
    canvas.height = bitmap.height * scale;

    // تحسين contrast بسيط
    ctx.filter = "contrast(1.3) brightness(1.1)";
    ctx.drawImage(bitmap,0,0,canvas.width,canvas.height);

    let raw = "";

    // 1. BarcodeDetector (سريع)
    if(detector){
        try{
            const res = await detector.detect(canvas);
            if(res.length){
                raw = res[0].rawValue;
            }
        }catch(e){}
    }

    // 2. ZXing (احترافي قوي)
    if(!raw){
        try{
            const result = await codeReader.decodeFromCanvas(canvas);
            raw = result.text;
        }catch(e){}
    }

    // استخراج IMEI
    const match = raw.match(/\d{15}/);

    if(match){
        document.getElementById("imei").value = match[0];
        status.innerText = "IMEI detected successfully!";
    }else{
        status.innerText = "No IMEI found - enter manually";
    }

    setTimeout(()=>status.style.display="none",3000);
});

// تحقق IMEI
function validateIMEI(imei){
    return /^\d{15}$/.test(imei);
}

function generateInvoice(){

    const imei = document.getElementById("imei").value.trim();

    if(!validateIMEI(imei)){
        alert("Invalid IMEI (must be 15 digits)");
        return;
    }

    document.getElementById("invImei").innerText = imei;
    document.getElementById("date").innerText = new Date().toLocaleString();

    document.getElementById("invoice").style.display = "block";
}
</script>

</body>
</html>
