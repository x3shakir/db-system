<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Speed IMEI System</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            margin-bottom: 5px;
            color: #1a1a1a;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            display: block;
        }
        .btn:hover {
            background-color: #0051bb;
        }
        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .input-group {
            margin-top: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: monospace;
        }
        .invoice-card {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #0070f3;
            background: #fff;
            text-align: left;
            border-radius: 10px;
        }
        .invoice-header {
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .invoice-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .imei-highlight {
            color: #0070f3;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
        }
        .print-btn {
            background-color: #22c55e;
            margin-top: 15px;
        }
        .print-btn:hover {
            background-color: #16a34a;
        }
        #status-msg {
            display: none;
            color: #0070f3;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>POS & IMEI System</h2>
    <p>Instant IMEI capture and invoice rendering</p>
    
    <div class="file-input-wrapper">
        <button class="btn">📷 Snap Screen or Box Barcode</button>
        <input type="file" accept="image/*" capture="environment" id="device-image" onchange="processDeviceImage(this)">
    </div>

    <div id="status-msg">Processing Image Data...</div>

    <div class="input-group">
        <label for="imei-manual">Verify IMEI Number:</label>
        <input type="text" id="imei-manual" class="input-field" placeholder="15-digit IMEI sequence" maxlength="15">
    </div>
    <button class="btn" style="background-color: #4b5563;" onclick="generateInvoice()">📋 Render Final Invoice</button>

    <div id="invoice" class="invoice-card">
        <div class="invoice-header">
            <h3>RECEIPT / INVOICE</h3>
        </div>
        <div class="invoice-row">
            <span><strong>Date/Time:</strong></span>
            <span id="inv-date"></span>
        </div>
        <div class="invoice-row">
            <span><strong>IMEI / Serial:</strong></span>
            <span id="inv-imei" class="imei-highlight"></span>
        </div>
        <div class="invoice-row">
            <span><strong>Item:</strong></span>
            <span>Smartphone (Verified Inventory)</span>
        </div>
        <div class="invoice-row">
            <span><strong>Price:</strong></span>
            <span>$500.00</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <button class="btn print-btn" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
</div>

<script>
async function processDeviceImage(input) {
    if (!input.files || input.files.length === 0) return;
    
    const file = input.files[0];
    const statusMsg = document.getElementById("status-msg");
    
    statusMsg.style.display = "block";
    statusMsg.innerText = "Reading data from hardware...";
    document.getElementById("invoice").style.display = "none";

    const imageBitmap = await createImageBitmap(file);

    // Using the system's hardware-accelerated BarcodeDetector API if available
    if ('BarcodeDetector' in window) {
        const barcodeDetector = new BarcodeDetector({ formats: ['code_128', 'ean_13', 'upc_a'] });
        try {
            const barcodes = await barcodeDetector.detect(imageBitmap);
            if (barcodes.length > 0) {
                document.getElementById("imei-manual").value = barcodes[0].rawValue;
                statusMsg.style.display = "none";
                generateInvoice();
                return;
            }
        } catch (e) {
            console.error("Hardware engine error:", e);
        }
    }

    // Fallback: Quick canvas extraction for manual override if barcode lines were blurred
    statusMsg.innerText = "Image loaded. If digits didn't autofill, type them below.";
    setTimeout(() => { statusMsg.style.display = "none"; }, 4000);
}

function generateInvoice() {
    const imeiValue = document.getElementById("imei-manual").value.trim();
    if (imeiValue === "" || imeiValue.length < 14) {
        alert("Please double check the field. A valid IMEI requires at least 14-15 digits.");
        return;
    }
    document.getElementById("inv-imei").innerText = imeiValue;
    const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById("inv-date").innerText = new Date().toLocaleDateString('en-US', options);
    document.getElementById("invoice").style.display = "block";
}
</script>

</body>
</html>
