<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMEI Scanner & Invoicing System</title>
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            margin-bottom: 5px;
            color: #1a1a1a;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: monospace;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            display: block;
        }
        .btn:hover {
            background-color: #0051bb;
        }
        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .secondary-btn {
            background-color: #4b5563;
        }
        .secondary-btn:hover {
            background-color: #374151;
        }
        .invoice-card {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #0070f3;
            background: #fff;
            text-align: left;
            border-radius: 10px;
        }
        .invoice-header {
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .invoice-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .imei-highlight {
            color: #0070f3;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
        }
        .print-btn {
            background-color: #22c55e;
            margin-top: 15px;
        }
        .print-btn:hover {
            background-color: #16a34a;
        }
        #loading {
            display: none;
            color: #0070f3;
            margin-top: 15px;
            font-weight: bold;
        }
        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
    </style>
</head>
<body>

<div class="container">
    <h2>POS & IMEI System</h2>
    <p>Generate instant business invoices using IMEI number</p>
    
    <!-- Method 1: Manual Entry (For screen code reading) -->
    <div class="input-group">
        <label for="imei-manual">Enter IMEI Manually (From *#06#):</label>
        <input type="text" id="imei-manual" class="input-field" placeholder="Enter 15-digit IMEI number" maxlength="15">
    </div>
    <button class="btn" onclick="generateManualInvoice()">📋 Generate Invoice</button>

    <div class="divider">OR</div>

    <!-- Method 2: Barcode Scanning (For boxes and stickers) -->
    <div class="file-input-wrapper">
        <button class="btn secondary-btn">📷 Scan Barcode from Box</button>
        <input type="file" accept="image/*" capture="environment" id="barcode-file" onchange="scanImage(this)">
    </div>

    <div id="loading">Processing IMEI Barcode...</div>

    <!-- Universal Invoice Component -->
    <div id="invoice" class="invoice-card">
        <div class="invoice-header">
            <h3>RECEIPT / INVOICE</h3>
        </div>
        <div class="invoice-row">
            <span><strong>Date/Time:</strong></span>
            <span id="inv-date"></span>
        </div>
        <div class="invoice-row">
            <span><strong>IMEI / Serial:</strong></span>
            <span id="inv-imei" class="imei-highlight"></span>
        </div>
        <div class="invoice-row">
            <span><strong>Item:</strong></span>
            <span>Smartphone (Fetched from DB)</span>
        </div>
        <div class="invoice-row">
            <span><strong>Price:</strong></span>
            <span>$500.00</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <button class="btn print-btn" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
</div>

<script>
function setInvoiceData(imeiValue) {
    document.getElementById("inv-imei").innerText = imeiValue;
    const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById("inv-date").innerText = new Date().toLocaleDateString('en-US', options);
    document.getElementById("invoice").style.display = "block";
}

function generateManualInvoice() {
    const imeiInput = document.getElementById("imei-manual").value.trim();
    if (imeiInput === "" || imeiInput.length < 14) {
        alert("Please enter a valid IMEI number.");
        return;
    }
    document.getElementById("loading").style.display = "none";
    setInvoiceData(imeiInput);
}

function scanImage(input) {
    if (!input.files || input.files.length === 0) return;
    
    const file = input.files;
    document.getElementById("loading").style.display = "block";
    document.getElementById("invoice").style.display = "none";

    const html5QrCode = new Html5Qrcode("invoice", {
        formatsToSupport: [ 
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.UPC_A
        ]
    }); 
    
    html5QrCode.scanFile(file, true)
    .then(decodedText => {
        document.getElementById("loading").style.display = "none";
        setInvoiceData(decodedText);
    })
    .catch(err => {
        document.getElementById("loading").style.display = "none";
        alert("Failed to read barcode. For typed numbers on screens, please type them in the manual field above.");
    });
}
</script>

</body>
</html>
