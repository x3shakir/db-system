<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro IMEI Scanner</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.btn{
    width:100%;
    padding:12px;
    background:#0070f3;
    color:#fff;
    border:none;
    border-radius:8px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{background:#0051bb;}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
    box-sizing: border-box;
}

#status{
    display:none;
    margin-top:10px;
    color:#0070f3;
}

.invoice{
    display:none;
    margin-top:20px;
    border:2px dashed #0070f3;
    padding:15px;
    text-align:left;
}

.imei{color:#0070f3;font-weight:bold;}
</style>

</head>

<body>

<div class="container">

<h2>📷 Pro IMEI Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="fileInput">

<input type="text" id="imei" placeholder="IMEI">

<div id="status">Scanning...</div>

<button class="btn" onclick="generateInvoice()">Generate Invoice</button>

<div class="invoice" id="invoice">
<h3>INVOICE</h3>
<p>IMEI: <span class="imei" id="invImei"></span></p>
<p>Date: <span id="date"></span></p>
<p>Item: <span id="invItem">Smartphone</span></p>
<p>Price: $<span id="invPrice">500</span></p>
<button class="btn" onclick="window.print()">Print</button>
</div>

</div>

<!-- External Engines Modules -->
<script src="https://unpkg.com"></script>
<script src="https://unpkg.com"></script>

<script>
// --- DATABASE INITIALIZATION CONFIGURATION ---
// Replace placeholders with your actual Supabase dashboard credentials when ready
const SUPABASE_URL = "YOUR_SUPABASE_URL_HERE";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY_HERE";
let supabase = null;

if (SUPABASE_URL !== "YOUR_SUPABASE_URL_HERE" && SUPABASE_KEY !== "YOUR_SUPABASE_ANON_KEY_HERE") {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

let detector = null;
if('BarcodeDetector' in window){
    detector = new BarcodeDetector({
        formats:[
            'code_128','code_39','ean_13','qr_code','pdf417','upc_a'
        ]
    });
}

const codeReader = new ZXing.BrowserMultiFormatReader();

document.getElementById("fileInput").addEventListener("change", async function(e){

    const file = e.target.files[0];
    if(!file) return;

    const status = document.getElementById("status");
    status.style.display = "block";
    status.innerText = "Processing image...";

    const bitmap = await createImageBitmap(file);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const scale = Math.min(1280 / bitmap.width, 1280 / bitmap.height, 1);

    canvas.width = bitmap.width * scale;
    canvas.height = bitmap.height * scale;

    ctx.filter = "contrast(1.3) brightness(1.1)";
    ctx.drawImage(bitmap,0,0,canvas.width,canvas.height);

    let raw = "";

    if(detector){
        try{
            const res = await detector.detect(canvas);
            if(res.length){
                raw = res[0].rawValue;
            }
        }catch(e){}
    }

    if(!raw){
        try{
            const result = await codeReader.decodeFromCanvas(canvas);
            raw = result.text;
        }catch(e){}
    }

    const match = raw.match(/\d{15}/);

    if(match){
        const detectedIMEI = match[0];
        document.getElementById("imei").value = detectedIMEI;
        status.innerText = "IMEI detected successfully!";
        
        // Dynamic look-up action if cloud db environment is ready
        if (supabase) {
            fetchProductDetails(detectedIMEI);
        }
    }else{
        status.innerText = "No IMEI found - enter manually";
    }

    setTimeout(()=>status.style.display="none",3000);
});

function validateIMEI(imei){
    return /^\d{15}$/.test(imei);
}

// Fetch dynamic model info and price lists from database inventory
async function fetchProductDetails(imeiNumber) {
    const status = document.getElementById("status");
    try {
        status.style.display = "block";
        status.innerText = "Checking inventory database...";
        
        const { data, error } = await supabase
            .from('products')
            .select('item_name, price')
            .eq('imei', imeiNumber)
            .single();

        if (data) {
            document.getElementById("invItem").innerText = data.item_name;
            document.getElementById("invPrice").innerText = data.price;
            status.innerText = "Product details linked!";
        } else {
            status.innerText = "New device IMEI (Defaulting to basic setup)";
            document.getElementById("invItem").innerText = "Smartphone";
            document.getElementById("invPrice").innerText = "500";
        }
    } catch (e) {
        console.error("Lookup mismatch bypassing:", e);
    }
    setTimeout(()=>status.style.display="none",2000);
}

// Save issued transactions globally to log files 
async function saveInvoiceToSupabase(imeiNumber, itemName, itemPrice) {
    if (!supabase) return;
    try {
        await supabase
            .from('invoices')
            .insert([
                { 
                    imei: imeiNumber, 
                    item_name: itemName, 
                    price: parseFloat(itemPrice),
                    created_at: new Date().toISOString()
                }
            ]);
        console.log("Transaction synchronized online successfully.");
    } catch (e) {
        console.error("Sync database logging interrupted:", e);
    }
}

function generateInvoice(){
    const imei = document.getElementById("imei").value.trim();

    if(!validateIMEI(imei)){
        alert("Invalid IMEI (must be 15 digits)");
        return;
    }

    const finalItem = document.getElementById("invItem").innerText;
    const finalPrice = document.getElementById("invPrice").innerText;

    document.getElementById("invImei").innerText = imei;
    document.getElementById("date").innerText = new Date().toLocaleString();
    document.getElementById("invoice").style.display = "block";

    // Silently pushes transaction records online if config parameters exist
    saveInvoiceToSupabase(imei, finalItem, finalPrice);
}
</script>

</body>
</html>
