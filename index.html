<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMEI Scanner & Invoicing System</title>
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            margin-bottom: 5px;
            color: #1a1a1a;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .btn {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0051bb;
        }
        #reader {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
        }
        #reader video {
            width: 100% !important;
            height: auto !important;
            border-radius: 10px;
        }
        .invoice-card {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #0070f3;
            background: #fff;
            text-align: left;
            border-radius: 10px;
        }
        .invoice-header {
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .invoice-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .imei-highlight {
            color: #0070f3;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
        }
        .print-btn {
            background-color: #22c55e;
            margin-top: 15px;
        }
        .print-btn:hover {
            background-color: #16a34a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>POS & IMEI Scanner</h2>
    <p>Scan device IMEI barcode to generate an instant invoice</p>
    
    <button class="btn" onclick="startScanner()">⚡ Open Camera & Scan</button>
    
    <div id="reader"></div>

    <div id="invoice" class="invoice-card">
        <div class="invoice-header">
            <h3>RECEIPT / INVOICE</h3>
        </div>
        <div class="invoice-row">
            <span><strong>Date/Time:</strong></span>
            <span id="inv-date"></span>
        </div>
        <div class="invoice-row">
            <span><strong>IMEI / Serial:</strong></span>
            <span id="inv-imei" class="imei-highlight"></span>
        </div>
        <div class="invoice-row">
            <span><strong>Item:</strong></span>
            <span>Smartphone (Fetched from DB)</span>
        </div>
        <div class="invoice-row">
            <span><strong>Price:</strong></span>
            <span>$500.00</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <button class="btn print-btn" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
</div>

<script>
let html5QrCode = null;

function startScanner() {
    if (html5QrCode === null) {
        html5QrCode = new Html5Qrcode("reader");
    }

    const constraints = { 
        video: { 
            facingMode: "environment",
            width: { ideal: 640 },
            height: { ideal: 480 }
        } 
    };

    navigator.mediaDevices.getUserMedia(constraints)
    .then((stream) => {
        const config = { 
            fps: 10,
            qrbox: function(viewfinderWidth, viewfinderHeight) {
                return {
                    width: Math.floor(viewfinderWidth * 0.8),
                    height: Math.floor(viewfinderHeight * 0.5)
                };
            }
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText, decodedResult) => {
                document.getElementById("inv-imei").innerText = decodedText;
                const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                document.getElementById("inv-date").innerText = new Date().toLocaleDateString('en-US', options);
                document.getElementById("invoice").style.display = "block";
                
                html5QrCode.stop().then(() => {
                    stream.getTracks().forEach(track => track.stop());
                }).catch(err => console.error(err));
            },
            (errorMessage) => {}
        ).then(() => {
            const videoElement = document.querySelector("#reader video");
            if (videoElement) {
                videoElement.setAttribute("playsinline", "true");
                videoElement.setAttribute("webkit-playsinline", "true");
                videoElement.play().catch(e => console.error("Playback prevented:", e));
            }
        }).catch((err) => {
            alert("Scanner error: " + err);
        });
    })
    .catch((err) => {
        alert("Camera initialization blocked: " + err);
    });
}
</script>

</body>
</html>
