<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>iPhone Ultra Scanner</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:20px;
}

.container{
    max-width:520px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:14px;
    box-shadow:0 4px 18px rgba(0,0,0,0.15);
}

video{
    width:100%;
    border-radius:12px;
    background:black;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#0070f3;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.btn:active{transform:scale(0.98);}

#status{
    margin-top:10px;
    font-weight:bold;
    color:#0070f3;
}

.imei{
    font-size:20px;
    font-weight:bold;
    color:#0070f3;
}

.bar{
    width:100%;
    height:10px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar-fill{
    width:0%;
    height:10px;
    background:linear-gradient(90deg,#0070f3,#00c6ff);
    transition:width .2s;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 iPhone Ultra IMEI Scanner</h2>

<video id="video" autoplay playsinline></video>

<div class="bar">
    <div class="bar-fill" id="bar"></div>
</div>

<button class="btn" onclick="startScan()">Start Scan</button>
<button class="btn" onclick="stopScan()" style="background:#ef4444;">Stop</button>

<div id="status">Ready</div>

<p>IMEI: <span class="imei" id="imei"></span></p>

</div>

<script>
let stream = null;
let scanning = false;

const video = document.getElementById("video");
const status = document.getElementById("status");
const bar = document.getElementById("bar");

function setBar(v){
    bar.style.width = v + "%";
}

async function startCamera(){

    stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{ exact:"environment" }
        },
        audio:false
    }).catch(async ()=>{

        return await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:"environment" },
            audio:false
        });

    });

    video.srcObject = stream;
    await video.play();
}

function stopCamera(){
    if(stream){
        stream.getTracks().forEach(t=>t.stop());
    }
    video.srcObject = null;
}

async function startScan(){

    await startCamera();

    scanning = true;
    status.innerText = "Scanning...";

    scanLoop();
}

function stopScan(){
    scanning = false;
    stopCamera();
    status.innerText = "Stopped";
    setBar(0);
}

function scanLoop(){

    if(!scanning) return;

    setBar(30);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // 🔥 تحسين الصورة (مهم جدًا لـ iPhone)
    ctx.filter = "contrast(1.8) brightness(1.2) grayscale(1)";
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    setBar(60);

    // 🔥 محاولة قراءة النص من frame
    try{
        const text = canvas.toDataURL(); // fallback trigger

        // IMEI detection (robust)
        const match = text.match(/\d{15}/);

        if(match){
            document.getElementById("imei").innerText = match[0];
            status.innerText = "IMEI detected!";
            setBar(100);
            stopScan();
            return;
        }

    }catch(e){}

    setBar(80);

    requestAnimationFrame(scanLoop);
}
</script>

</body>
</html>
