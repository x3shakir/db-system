<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Ultra IMEI Pro Scanner</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:20px;
}

.container{
    max-width:520px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:14px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

video{
    width:100%;
    border-radius:12px;
    background:black;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#0070f3;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.btn:active{transform:scale(0.98);}

#status{
    margin-top:10px;
    font-weight:bold;
    color:#0070f3;
}

.imei{
    font-size:20px;
    font-weight:bold;
    color:#0070f3;
}

.bar{
    width:100%;
    height:10px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar-fill{
    width:0%;
    height:10px;
    background:linear-gradient(90deg,#0070f3,#00c6ff);
    transition:width .2s;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 Ultra IMEI Pro Scanner</h2>

<video id="video" autoplay playsinline></video>

<div class="bar">
    <div class="bar-fill" id="bar"></div>
</div>

<button class="btn" onclick="startCamera()">Start Camera</button>
<button class="btn" onclick="captureAndScan()">Capture & Scan</button>

<div id="status">Ready</div>

<p>IMEI: <span class="imei" id="imei"></span></p>

</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");
const bar = document.getElementById("bar");

const reader = new ZXing.BrowserMultiFormatReader();

let stream = null;

function setBar(v){
    bar.style.width = v + "%";
}

async function startCamera(){

    stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{ exact:"environment" }
        },
        audio:false
    }).catch(async ()=>{

        return await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:"environment" },
            audio:false
        });

    });

    video.srcObject = stream;
    await video.play();

    status.innerText = "Camera ready";
}

function stopCamera(){
    if(stream){
        stream.getTracks().forEach(t=>t.stop());
    }
    video.srcObject = null;
}

async function captureAndScan(){

    status.innerText = "Capturing frame...";
    setBar(30);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // 🔥 تكبير بسيط لتحسين القراءة
    const scale = 1.5;

    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;

    ctx.filter = "contrast(1.8) brightness(1.2) grayscale(1)";
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    setBar(60);

    let imei = null;

    // 🔁 3 محاولات لتحسين النجاح
    for(let i=0;i<3;i++){

        try{
            const result = await reader.decodeFromCanvas(canvas);
            const text = result.text;

            const match = text.match(/\d{15}/);

            if(match){
                imei = match[0];
                break;
            }

        }catch(e){}
    }

    setBar(100);

    if(imei){
        document.getElementById("imei").innerText = imei;
        status.innerText = "IMEI detected successfully!";
    }else{
        status.innerText = "No IMEI found - try better lighting";
    }

    setTimeout(()=>setBar(0),1000);
}
</script>

</body>
</html>
