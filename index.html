<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live IMEI Scanner</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

video{
    width:100%;
    border-radius:10px;
    margin-top:10px;
    background:black;
}

.btn{
    width:100%;
    padding:12px;
    background:#0070f3;
    color:white;
    border:none;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{background:#0051bb;}

#status{
    margin-top:10px;
    color:#0070f3;
    font-weight:bold;
}

.imei{
    font-size:18px;
    color:#0070f3;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📷 Live IMEI Scanner</h2>

<video id="video" autoplay></video>

<button class="btn" onclick="startScan()">Start Camera</button>
<button class="btn" onclick="stopScan()">Stop</button>

<div id="status">Camera inactive</div>

<p>IMEI: <span class="imei" id="imei"></span></p>

</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");

const codeReader = new ZXing.BrowserMultiFormatReader();

let stream = null;
let scanning = false;

async function startCamera(){
    stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:"environment" }
    });
    video.srcObject = stream;
}

function stopCamera(){
    if(stream){
        stream.getTracks().forEach(t=>t.stop());
    }
    video.srcObject = null;
}

async function startScan(){

    await startCamera();

    scanning = true;
    status.innerText = "Scanning for IMEI...";

    scanLoop();
}

function stopScan(){
    scanning = false;
    stopCamera();
    status.innerText = "Stopped";
}

function scanLoop(){

    if(!scanning) return;

    try{
        codeReader.decodeOnceFromVideoElement(video)
        .then(result=>{

            const text = result.text;
            const match = text.match(/\d{15}/);

            if(match){
                document.getElementById("imei").innerText = match[0];
                status.innerText = "IMEI detected!";
                stopScan();
                return;
            }

        })
        .catch(()=>{});

    }catch(e){}

    requestAnimationFrame(scanLoop);
}
</script>

</body>
</html>
