<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMEI Scanner Fix</title>
<style>
body{font-family:Arial;text-align:center;background:#f5f7fb;padding:20px}
.container{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:12px}
video{width:100%;border-radius:10px}
.btn{width:100%;padding:12px;margin-top:10px;background:#0070f3;color:#fff;border:none;border-radius:8px}
#status{margin-top:10px;color:#0070f3;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>📱 IMEI Scanner (Fixed iPhone)</h2>

<video id="video" autoplay playsinline></video>

<button class="btn" onclick="startCamera()">Start Camera</button>
<button class="btn" onclick="capture()">Capture & Scan</button>

<div id="status">Ready</div>

<p>IMEI: <b id="imei"></b></p>

</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");
const reader = new ZXing.BrowserMultiFormatReader();

let stream = null;

async function startCamera(){

    stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:"environment" }
    });

    video.srcObject = stream;
    await video.play();

    status.innerText = "Camera ready";
}

async function capture(){

    status.innerText = "Scanning frame...";

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    try{
        const result = await reader.decodeFromCanvas(canvas);

        const text = result.text;
        const match = text.match(/\d{15}/);

        if(match){
            document.getElementById("imei").innerText = match[0];
            status.innerText = "IMEI Found!";
        }else{
            status.innerText = "No IMEI detected";
        }

    }catch(e){
        status.innerText = "Scan failed - try again";
    }
}
</script>

</body>
</html>
